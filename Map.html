<style>
  html, body { margin:0; padding:0; background:#2b2620; }
  * { box-sizing:border-box; }
  body { font-family:"EB Garamond", Georgia, serif; }

  /* ——— Atlas-style stage: map sheet sits on a leather/boards spread ——— */
  .stage {
    position: relative;
    background:
      /* soft corner vignette */
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%),
      /* warm leather tone */
      linear-gradient(135deg, #3a2f24 0%, #241d16 55%, #3a2f24 100%);
  }
  /* Fine grain texture layered over the leather */
  .stage::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(92deg, rgba(255,230,190,0.018) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(2deg,  rgba(0,0,0,0.05) 0 1px, transparent 1px 4px);
    mix-blend-mode: overlay;
  }
  /* Embossed frame line — like the inner gilt border of an atlas */
  .stage::after {
    content: "";
    position: absolute;
    inset: 28px;
    pointer-events: none;
    border: 1px solid rgba(184,107,60,0.28);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.4),
      inset 0 0 60px rgba(0,0,0,0.35);
  }

  /* Plate number & atlas meta, rendered in the margins.
     Dark, chiseled — reads clearly against leather AND against the paper sheet. */
  .plate-mark {
    position: absolute;
    color: #1a110a;
    font-family: "Special Elite", monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    pointer-events: none;
    z-index: 4;
    /* Embossed gilt effect — multi-layered warm glow like lamp-lit gold leaf */
    text-shadow:
      0 1px 0 rgba(255,240,205,0.45),
      0 0 4px rgba(255,225,175,0.55),
      0 0 12px rgba(255,210,150,0.45),
      0 0 26px rgba(255,195,125,0.35),
      0 0 48px rgba(255,180,100,0.22);
  }
  .plate-mark .big {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 34px;
    letter-spacing: 0.05em;
    color: #0e0805;
    display: block;
    line-height: 1;
    text-shadow:
      0 1px 0 rgba(255,240,205,0.55),
      0 0 6px rgba(255,225,175,0.7),
      0 0 18px rgba(255,210,150,0.55),
      0 0 38px rgba(255,195,125,0.42),
      0 0 70px rgba(255,180,100,0.28);
  }
  .plate-mark .rule {
    display: block;
    height: 1px;
    background: rgba(26,17,10,0.55);
    margin: 8px 0;
    box-shadow: 0 1px 0 rgba(255,240,205,0.35);
  }
  /* All plate-marks are FIXED to the viewport — so on scrollable doc pages
     they stay glued to the edges instead of scrolling away */
  .tl, .tr, .bl, .br {
    position: fixed;
    z-index: 5;
  }
  .tl { top: 46px; left: 46px; }
  .tr { top: 46px; right: 46px; text-align: right; }
  .bl { bottom: 46px; left: 46px; }
  .br { bottom: 46px; right: 46px; text-align: right; }

  /* Corner ornaments on the outer board */
  .corner {
    position: absolute;
    width: 44px; height: 44px;
    pointer-events: none;
    opacity: 0.55;
  }
  .corner::before, .corner::after {
    content: ""; position: absolute;
    background: rgba(217,186,138,0.55);
  }
  .corner::before { left: 0; top: 50%; width: 100%; height: 1px; }
  .corner::after  { top: 0; left: 50%; width: 1px; height: 100%; }
  .corner-dot {
    position: absolute; left: 50%; top: 50%;
    width: 6px; height: 6px;
    background: #b86b3c;
    transform: translate(-50%, -50%) rotate(45deg);
  }
  .c-tl { top: 14px; left: 14px; }
  .c-tr { top: 14px; right: 14px; }
  .c-bl { bottom: 14px; left: 14px; }
  .c-br { bottom: 14px; right: 14px; }

  /* The map sheet wraps the fixed canvas and scales together with it */
  .sheet {
    position: relative;
    width: 1440px; height: 900px;
    transform-origin: center;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 20px 60px rgba(0,0,0,0.55),
      0 40px 120px rgba(0,0,0,0.35);
  }
  /* Subtle deckle-edge highlight along the top of the sheet */
  .sheet::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: -2px; height: 6px;
    background: linear-gradient(180deg, rgba(255,245,220,0.22), rgba(255,245,220,0) 100%);
    pointer-events: none;
    z-index: 3;
  }
  /* Canvas fills the sheet; no independent transform */
  .sheet .canvas { transform: none !important; }

  /* Event pin animation */
  @keyframes eventPulse {
    0%   { transform: scale(0.9); opacity: 0.7; }
    70%  { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  @keyframes eventBob {
    0%,100% { transform: translateY(0) rotate(-6deg); }
    50%     { transform: translateY(-3px) rotate(-4deg); }
  }
  @keyframes eventFlag {
    0%,100% { transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }
  @keyframes eventGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(184,107,60,0.55); }
    50%     { box-shadow: 0 0 0 10px rgba(184,107,60,0); }
  }

  @keyframes route-draw {
    0%   { stroke-dashoffset: 100; opacity: 0; }
    30%  { opacity: 0.9; }
    100% { stroke-dashoffset: 0; opacity: 0.9; }
  }
  @keyframes route-flow {
    to { stroke-dashoffset: -24; }
  }

  /* Typewriter cursor blink */
  @keyframes tw-blink {
    0%, 55% { opacity: 0.85; }
    56%, 100% { opacity: 0; }
  }

  /* Page scales to viewport, fixed 1440x900 canvas */
  .stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .canvas {
    width: 1440px; height: 900px;
    transform-origin: center;
    position: relative;
  }
  /* Put map sheet above the margin decorations */
  .canvas { z-index: 1; }

  /* ——— Document-page mode (About/Team/Contact/Workshop) ——— */
  /* When body.page-doc is set, the stage becomes a scrollable page of paper
     sitting in the atlas boards. The leather margins + plate marks stay fixed
     as a frame around the scrolling sheet. */
  body.page-doc { overflow: hidden; } /* outer body static; .stage scrolls */
  body.page-doc .stage {
    display: block;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 64px 0 64px;           /* top + bottom leather reveal */
  }
  body.page-doc .sheet {
    width: min(1160px, calc(100vw - 180px));
    height: auto;                    /* grow with content */
    margin: 0 auto;
    transform: none !important;      /* no scale; natural flow */
    min-height: calc(100vh - 160px);
    background: #efe6d0;             /* paper fallback while React mounts */
  }
  body.page-doc .canvas {
    width: 100%;
    height: auto;
    min-height: calc(100vh - 160px);
  }
  body.page-doc .canvas > * {         /* React root fills the sheet */
    min-height: calc(100vh - 160px);
  }
  /* Keep the deckle highlight on docs too */
  body.page-doc .sheet::before {
    background: linear-gradient(180deg, rgba(255,245,220,0.28), rgba(255,245,220,0) 100%);
  }
  /* Doc pages may set their own height:100% + overflow; neutralize so the
     stage does the scrolling and content flows naturally inside the sheet. */
  body.page-doc #about-scroll-root,
  body.page-doc .canvas > div {
    height: auto !important;
    min-height: 100%;
    overflow: visible !important;
  }
  /* Neutralize sticky headers inside doc pages — they'd stick to the sheet
     corner, not the viewport, which looks off. */
  body.page-doc .canvas [style*="position: sticky"],
  body.page-doc .canvas [style*="position:sticky"] {
    position: static !important;
  }

  /* desktop default: show nav bar, hide mobile hamburger slot */
  .mobile-nav-slot { display: none; }
  .desktop-nav     { display: flex; }

  /* ═══════════════════════════════════════════════════════════
     MOBILE  ≤ 640 px
     ═══════════════════════════════════════════════════════════ */
  @media (max-width: 640px) {
    .plate-mark, .corner { display: none !important; }
    #back-to-top-btn { display: none !important; }
    .stage { padding: 0 !important; }

    body:not(.page-doc) .sheet {
      width: 100vw !important;
      height: 100vh !important;
      box-shadow: none !important;
    }
    body.page-doc .sheet {
      width: 100vw !important;
      margin: 0 !important;
      min-height: 100vh !important;
    }
    body.page-doc { overflow: hidden; }
    body.page-doc .stage { padding: 0 !important; }

    .desktop-nav  { display: none !important; }
    .mobile-nav-slot { display: flex !important; }

    .doc-topbar { padding: 14px 16px !important; }
    .doc-logo-rule { display: none !important; }
    .doc-logo-zh   { display: none !important; }
    .doc-content   { padding: 24px 16px 60px !important; }

    .doc-opener-grid  { display: block !important; }
    .doc-opener-grid > * + * { margin-top: 28px !important; }
    .doc-cards-grid   { display: block !important; }
    .doc-cards-grid > * + * { margin-top: 16px !important; }
    .doc-two-col      { display: block !important; }
    .doc-two-col > * + * { margin-top: 16px !important; }
    .doc-workshop-grid { display: block !important; }
    .doc-workshop-grid > * + * { margin-top: 24px !important; }
    .about-two-col    { display: block !important; }
    .about-two-col > * + * { margin-top: 20px !important; }
    .doc-display-heading { font-size: clamp(1.9rem, 8vw, 2.6rem) !important; }
    .doc-footer-row {
      flex-direction: column !important;
      gap: 20px !important;
      align-items: flex-start !important;
    }
  }
</style>

<script>
  // Auto-scale the fixed canvas (via its .sheet wrapper) to viewport.
  // Skipped when body has .page-doc (document pages use natural flow).
  function fit() {
    const s = document.querySelector('.sheet');
    if (!s) return;
    if (document.body.classList.contains('page-doc') ||
        window.matchMedia('(max-width: 640px)').matches) {
      s.style.transform = 'none';
      s.style.width = '';
      s.style.height = '';
      return;
    }
    const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 900) * 0.92;
    s.style.transform = `scale(${scale})`;
    s.style.width = '';
    s.style.height = '';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('load', fit);
  // Expose so React can re-fit after toggling page mode
  window.__refit = fit;
</script>

const useIsMobile = () => {
  const [mobile, setMobile] = React.useState(() => window.innerWidth <= 640);
  React.useEffect(() => {
    const mq = window.matchMedia("(max-width: 640px)");
    const handler = (e) => setMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);

/* ──────────────────────────────────────────────────────────────
   MOBILE MAP VIEW
   ────────────────────────────────────────────────────────────── */
const MobileMapView = ({ tweaks, page, setPage }) => {
  const T = tweaks;
  const P = PALETTES[T.palette] || PALETTES.cream;
  const [sel, setSel] = React.useState(null);
  const audioRef = React.useRef(null);
  const [playing, setPlaying] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [elapsed, setElapsed] = React.useState(0);

  React.useEffect(() => {
    setPlaying(false); setProgress(0); setElapsed(0);
    if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
  }, [sel]);

  const fmt = (s) => {
    if (!isFinite(s) || s < 0) s = 0;
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  };
  const togglePlay = () => {
    const a = audioRef.current; if (!a) return;
    if (a.paused) { a.play(); setPlaying(true); }
    else { a.pause(); setPlaying(false); }
  };
  const onSeek = (e) => {
    const a = audioRef.current; if (!a || !a.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));

/* ──────────────────────────────────────────────────────────────
   TYPEWRITER TITLE — shared 2-line title with typewriter animation.
   Types line 1, pauses like a carriage return, types line 2,
   then blinks cursor briefly and hides it. Only animates once per
   session; subsequent renders (e.g. after page nav) show the final
   state instantly.
   ────────────────────────────────────────────────────────────── */
const TypewriterTitle = ({ fontSize = 26, letterSpacing = "0.08em", color, line1 = "CHINESE COMMUNITY", line2 = "ORAL HISTORY PROJECT", marginTop = 4 }) => {
  const full = line1 + "\n" + line2;
  // Session flag — only play once across the whole session
  const sessionKey = "title-typed-v1";
  const hasTyped = typeof window !== "undefined" && window.sessionStorage && window.sessionStorage.getItem(sessionKey) === "1";

  const [idx, setIdx] = React.useState(hasTyped ? full.length : 0);
  const [cursorVisible, setCursorVisible] = React.useState(!hasTyped);
  const [cursorBlink, setCursorBlink] = React.useState(true);

  React.useEffect(() => {
    if (hasTyped) return;
    let i = 0;
    let cancelled = false;
    const step = () => {
      if (cancelled) return;
      i++;
      setIdx(i);
      if (i >= full.length) {
        // Done typing — blink cursor a few times then hide
        setTimeout(() => { if (!cancelled) setCursorBlink(false); }, 1400);
        setTimeout(() => { if (!cancelled) setCursorVisible(false); }, 1700);
        try { window.sessionStorage.setItem(sessionKey, "1"); } catch(e){}
        return;
      }
      // Pause longer after the line break (carriage-return feel)
      const ch = full[i - 1];
      const isNewline = ch === "\n";
      const delay = isNewline ? 380 : 55 + Math.random() * 35;
      setTimeout(step, delay);
    };
    // Brief initial delay before typing starts
    const t = setTimeout(step, 220);
    return () => { cancelled = true; clearTimeout(t); };
  }, []);

  // Cursor blink CSS
  const blinkStyle = {
    display: cursorVisible ? "inline-block" : "none",
    width: "0.55em",
    height: "1em",
    marginLeft: "2px",
    verticalAlign: "-0.12em",
    background: color || "currentColor",
    opacity: 0.85,
    animation: cursorBlink ? "tw-blink 0.7s step-end infinite" : "none"
  };

  const typed = full.slice(0, idx);
  const [t1, t2 = ""] = typed.split("\n");

  return (
    <div style={{
      fontFamily: '"Cormorant Garamond", serif',
      fontSize,
      letterSpacing,
      marginTop,
      color,
      lineHeight: 1.08
    }}>
      <span>{t1}</span>
      {idx >= line1.length && <br/>}
      <span>{t2}</span>
      <span style={blinkStyle}/>
    </div>
  );
};

const BigNickelShape = ({ cx, cy, r, stroke, fill, ink, mute, copper }) => {
  // The Big Nickel — giant vertical coin landmark. Rendered as a coin on-edge:
  // outer circle (face), inner concentric ring (rim), stylized "5" mark, label below.
  return (
    <g>
      {/* Soft halo — like the lake fills, so it reads as an on-map landmark, not a UI badge */}
      <ellipse cx={cx} cy={cy + r + 4} rx={r * 0.9} ry={r * 0.14} fill={stroke} opacity="0.18" />

      <circle cx={cx} cy={cy} r={r - 8} fill="none" stroke={stroke} strokeWidth="0.5" opacity="0.7" />
      {/* Edge hash marks — coin milling */}
      {Array.from({ length: 36 }).map((_, i) => {
        const a = (i / 36) * Math.PI * 2;
        const x1 = cx + Math.cos(a) * (r - 2);
        const y1 = cy + Math.sin(a) * (r - 2);
        const x2 = cx + Math.cos(a) * (r - 5);

        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={stroke} strokeWidth="0.4" opacity="0.55" />;

const PathNetwork = ({ points, color, dash, active, copper }) => {
  // Routes radiating from Laurentian University (id=4), the anchor point
  const routes = [
    [4, 2], [4, 3], [4, 5], [4, 7],
    [2, 3], [3, 7], [5, 7]
  ];

  const byId = Object.fromEntries(points.map((p) => [p.id, p]));
  // Find the first active route for the bird to fly along
  const activeRoute = routes.find(([a, b]) => a === active || b === active);
  let birdPath = null;
  if (activeRoute) {
    const [a, b] = activeRoute;
    const pa = byId[a], pb = byId[b];
    if (pa && pb) {
      const idx = routes.indexOf(activeRoute);
      const mx = (pa.x + pb.x) / 2;
      const my = (pa.y + pb.y) / 2 - 50 - (idx % 3) * 18;
      birdPath = `M ${pa.x} ${pa.y} Q ${mx} ${my} ${pb.x} ${pb.y}`;
    }
  }

  return (
    <g fill="none">
      {/* Inactive routes — faint, dashed */}
      {routes.map(([a, b], i) => {
        const pa = byId[a], pb = byId[b];
        if (!pa || !pb) return null;
        const mx = (pa.x + pb.x) / 2;
        const my = (pa.y + pb.y) / 2 - 50 - (i % 3) * 18;
        const isActive = a === active || b === active;
        return (
          <g key={i}>
            {/* base line — soft */}
            <path
              d={`M ${pa.x} ${pa.y} Q ${mx} ${my} ${pb.x} ${pb.y}`}
              stroke={color}
              strokeWidth={isActive ? 0 : 1.2}
              strokeDasharray={dash}
              opacity={isActive ? 0 : 0.55}
            />
            {/* active overlay — bright copper, thicker, animated dash flow */}
            {isActive && (
              <path
                d={`M ${pa.x} ${pa.y} Q ${mx} ${my} ${pb.x} ${pb.y}`}
                stroke={copper}
                strokeWidth="2.2"
                strokeDasharray="10 5"
                strokeLinecap="round"
                opacity="0.9"
                style={{ animation: "route-flow 1.8s linear infinite" }}
              />
            )}
          </g>
        );
      })}

      {/* Flying bird — travels along the active path */}
      {birdPath && (
        <g key={birdPath}>
          <path id="birdTrack" d={birdPath} fill="none" stroke="none" />
          <g>
            {/* Simple bird silhouette — two wing curves */}
            <path
              d="M -8 0 Q -4 -5 0 0 Q 4 -5 8 0"
              fill="none"
              stroke={copper}
              strokeWidth="1.8"
              strokeLinecap="round"
            >
              <animate
                attributeName="d"
                values="M -8 0 Q -4 -5 0 0 Q 4 -5 8 0;M -8 2 Q -4 -2 0 2 Q 4 -2 8 2;M -8 0 Q -4 -5 0 0 Q 4 -5 8 0"
                dur="0.6s"
                repeatCount="indefinite"
              />
            </path>
            <animateMotion dur="4.5s" repeatCount="indefinite" rotate="auto">
              <mpath href="#birdTrack" />
            </animateMotion>
          </g>
        </g>
      )}
    </g>
  );
};

  const [progress, setProgress] = React.useState(0); // 0..1
  const [elapsed, setElapsed] = React.useState(0); // seconds

  // Reset playback state when switching points
  React.useEffect(() => {
    setPlaying(false);
    setProgress(0);
    setElapsed(0);
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.currentTime = 0;
    }
  }, [point && point.id]);

  const fmt = (s) => {
    if (!isFinite(s) || s < 0) s = 0;
    const m = Math.floor(s / 60);
    const r = Math.floor(s % 60);
    return `${m}:${String(r).padStart(2, "0")}`;
  };

  const togglePlay = () => {
    const a = audioRef.current;
    if (!a) return;
    if (a.paused) { a.play(); setPlaying(true); }
    else { a.pause(); setPlaying(false); }
  };

  const onSeek = (e) => {
    const a = audioRef.current;
    if (!a || !a.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    a.currentTime = p * a.duration;
    setProgress(p);
    setElapsed(a.currentTime);
  };

  if (!point) return null;
  const isEvent = point.kind === "event";

const App = () => {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  // re-render Map on tweak change by passing them through
  // Replace the hardcoded TWEAKS reference in Map:
  // Easier: make Map read from a context. But we'll just pass as key.

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOn(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  // Re-mount map when tweaks change so the component picks up new defaults
  return (
    <>
      <MapWithTweaks tweaks={tweaks} />
      <TweakPanel on={tweaksOn} tweaks={tweaks} setTweaks={setTweaks} />
    </>);

};

const applyPageChrome = (page) => {
  const isDoc = page !== "map";
  document.body.classList.toggle("page-doc", isDoc);
  // Reset scroll when switching pages so doc-pages always open at top and
  // coming back to the map starts flush against the top (not inheriting
  // a previous doc's scroll offset).
  const stage = document.querySelector(".stage");
  if (stage) stage.scrollTop = 0;
  window.scrollTo(0, 0);
  const info = PLATE_INFO[page] || PLATE_INFO.map;
  const set = (sel, html) => { const el = document.querySelector(sel); if (el) el.innerHTML = html; };
  set(".plate-mark.tl",
    `<span>${info.vol}</span><span class="rule"></span><span class="big">${info.roman}</span><span>${info.name}</span>`);
  set(".plate-mark.tr",
    `<span>${info.tr}</span><span class="rule"></span><span class="big" style="font-size:22px;">${info.tri}</span><span>${info.tri_label}</span>`);
  set(".plate-mark.bl",
    `<span>${info.bl}</span><span class="rule"></span><span class="big" style="font-size:22px;">${info.bli}</span><span>FOLIO · 2026</span>`);
  set(".plate-mark.br",
    `<span>${info.br}</span><span class="rule"></span><span class="big" style="font-size:22px;">Laurentian</span><span>LAURENTIAN U · ONT</span>`);
  if (window.__refit) window.__refit();
  // Tell the damped-scroll system the page changed so it can re-capture
  // the scroller and reset state.
  if (window.__stageScrollReset) window.__stageScrollReset();
};

/* ─────────────────────────────────────────────────────────────
   Global damped scroll + back-to-top button for doc pages.
   Attaches to `.stage` once; only intercepts wheel when the stage
   is actually scrollable (page-doc mode).
   ───────────────────────────────────────────────────────────── */
(() => {
  let stage = null;
  let currentY = 0;
  let targetY = 0;
  let rafId = null;
  const LERP = 0.11; // lower = heavier/more damped

  const clamp = (y) => {
    if (!stage) return y;
    const max = stage.scrollHeight - stage.clientHeight;
    return Math.max(0, Math.min(max, y));
  };

  const tick = () => {
    if (!stage) { rafId = null; return; }
    const dy = targetY - currentY;
    if (Math.abs(dy) < 0.4) {
      currentY = targetY;
      stage.scrollTop = currentY;
      rafId = null;
      updateBackToTop();
      return;
    }
    currentY += dy * LERP;
    stage.scrollTop = currentY;
    updateBackToTop();
    rafId = requestAnimationFrame(tick);
  };

  const isStageScrollable = () => {
    if (!stage) return false;
    return document.body.classList.contains("page-doc")
      && stage.scrollHeight > stage.clientHeight + 4;
  };

  const onWheel = (e) => {
    if (!isStageScrollable()) return;
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
    e.preventDefault();
    if (rafId === null) currentY = stage.scrollTop;
    let dy = e.deltaY;
    if (e.deltaMode === 1) dy *= 16;
    dy = Math.max(-140, Math.min(140, dy));
    targetY = clamp(targetY + dy);
    if (rafId === null) rafId = requestAnimationFrame(tick);
  };

  // Keep targetY in sync when user uses keyboard, touch, or scrollbar drag
  const onScroll = () => {
    if (rafId !== null) return; // our animation is driving
    if (!stage) return;
    currentY = targetY = stage.scrollTop;
    updateBackToTop();
  };

  // ── Back-to-top button ───────────────────────────────────────
  let btn = null;
  const mountBtn = () => {
    if (btn) return;
    // Inject per-piece styling once (inline styles can't do :hover / children)
    if (!document.getElementById("btt-style")) {
      const st = document.createElement("style");
      st.id = "btt-style";
      st.textContent = `
        #back-to-top-btn .btt-rule {
          display: block;
          width: 1px;
          height: 22px;
          background: rgba(26, 17, 10, 0.55);
          box-shadow: 0 0 6px rgba(255, 210, 150, 0.45);
        }
        #back-to-top-btn .btt-rule-b { height: 18px; }
        #back-to-top-btn .btt-arrow {
          display: flex;
          transition: transform 420ms cubic-bezier(.4,.1,.2,1);
        }
        #back-to-top-btn .btt-label {
          writing-mode: vertical-rl;
          transform: rotate(180deg);
          font-family: "Cormorant Garamond", "EB Garamond", serif;
          font-size: 13px;
          font-style: italic;
          letter-spacing: 0.06em;
          text-transform: none;
          color: #0e0805;
        }
        #back-to-top-btn .btt-label i { font-style: italic; }
        #back-to-top-btn .btt-mark {
          font-family: "Cormorant Garamond", serif;
          font-style: italic;
          font-size: 16px;
          line-height: 1;
          color: #b86b3c;           /* copper accent */
          text-shadow:
            0 0 6px rgba(255, 200, 140, 0.7),
            0 0 18px rgba(255, 170, 100, 0.45);
        }
        #back-to-top-btn:hover .btt-arrow {
          transform: translateY(-4px);
        }
        #back-to-top-btn:hover .btt-mark {
          color: #d08a4a;
        }
        #back-to-top-btn:focus-visible {
          outline: 1px dashed rgba(26, 17, 10, 0.6);
          outline-offset: 6px;
        }
      `;
      document.head.appendChild(st);
    }
    btn = document.createElement("button");
    btn.id = "back-to-top-btn";
    btn.setAttribute("aria-label", "Return to top of page");
    // A plate-mark-style marginal annotation: a thin vertical rule, a small
    // engraved arrow glyph, and the words "Return / to top" running vertically,
    // separated by a copper § symbol. No pill, no box — just type-as-object
    // on the leather margin, matching the atlas visual vocabulary.
    btn.innerHTML = `
      <span class="btt-rule" aria-hidden="true"></span>
      <span class="btt-arrow" aria-hidden="true">
        <svg viewBox="0 0 14 22" width="14" height="22" fill="none"
             stroke="currentColor" stroke-width="1.1"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 20 V3"></path>
          <path d="M2.5 7.5 L7 3 L11.5 7.5"></path>
        </svg>
      </span>
      <span class="btt-label">Return</span>
      <span class="btt-mark">§</span>
      <span class="btt-label">to top</span>
      <span class="btt-rule btt-rule-b" aria-hidden="true"></span>
    `;
    Object.assign(btn.style, {
      position: "fixed",
      // Hug the sheet's right edge. Sheet width = min(1160px, 100vw - 180px)
      // centered, so the right margin band width = max(90px, (100vw-1160px)/2).
      // Offset the button so it sits immediately outside the sheet's right
      // edge, in the margin. Button is ~18px wide, so subtract ~26px to
      // land it flush-adjacent to the paper.
      right: "calc(max(90px, (100vw - 1160px) / 2) - 26px)",
      // Golden-ratio from bottom (≈ 38.2vh up from the bottom edge).
      bottom: "38.2vh",
      top: "auto",
      zIndex: "9000",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      gap: "9px",
      padding: "0",
      margin: "0",
      background: "transparent",
      color: "#1a110a",
      border: "0",
      outline: "0",
      font: '400 9.5px/1 "Special Elite", monospace',
      letterSpacing: "0.32em",
      textTransform: "uppercase",
      cursor: "pointer",
      opacity: "0",
      transform: "translateY(8px)",
      transition: "opacity 320ms ease, transform 320ms ease",
      pointerEvents: "none",
      boxShadow: "none",
      // Gilt emboss matching .plate-mark for visual continuity
      textShadow: [
        "0 1px 0 rgba(255,240,205,0.45)",
        "0 0 4px rgba(255,225,175,0.55)",
        "0 0 12px rgba(255,210,150,0.45)",
        "0 0 26px rgba(255,195,125,0.35)",
      ].join(", "),
    });
    btn.addEventListener("click", () => {
      if (!stage) return;
      targetY = 0;
      if (rafId === null) {
        currentY = stage.scrollTop;
        rafId = requestAnimationFrame(tick);
      }
    });
    document.body.appendChild(btn);
  };

  const updateBackToTop = () => {
    if (!btn || !stage) return;
    const show = isStageScrollable() && stage.scrollTop > 400;
    btn.style.opacity = show ? "1" : "0";
    btn.style.transform = show ? "translateY(0)" : "translateY(12px)";
    btn.style.pointerEvents = show ? "auto" : "none";
  };

  const init = () => {
    stage = document.querySelector(".stage");
    if (!stage) { requestAnimationFrame(init); return; }
    mountBtn();
    stage.addEventListener("wheel", onWheel, { passive: false });
    stage.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", () => {
      if (!stage) return;
      targetY = clamp(targetY);
      currentY = stage.scrollTop;
      updateBackToTop();
    });
  };

  window.__stageScrollReset = () => {
    if (!stage) return;
    // On page change, hard-reset our damped state to match the scroller.
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    currentY = stage.scrollTop;
    targetY = stage.scrollTop;
    updateBackToTop();
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

const MapWithTweaks = ({ tweaks }) => {
  const [page, setPage] = React.useState("map");
  const isMobile = useIsMobile();

  React.useEffect(() => {
    if (!isMobile) {
      applyPageChrome(page);
    } else {
      document.body.classList.toggle("page-doc", page !== "map");
      if (window.__refit) window.__refit();
    }
    const st = document.querySelector(".stage");
    if (st) st.scrollTop = 0;
    window.scrollTo(0, 0);
    if (window.__stageScrollReset) window.__stageScrollReset();
  }, [page, isMobile]);

  if (isMobile && page === "map") return <MobileMapView tweaks={tweaks} page={page} setPage={setPage} />;
  if (page === "team")     return <TeamPage     tweaks={tweaks} page={page} setPage={setPage} />;
  if (page === "contact")  return <ContactPage  tweaks={tweaks} page={page} setPage={setPage} />;
  if (page === "workshop") return <WorkshopPage tweaks={tweaks} page={page} setPage={setPage} />;
  if (page === "about")    return <AboutPage    tweaks={tweaks} page={page} setPage={setPage} />;
  return <MapWithProps tweaks={tweaks} page={page} setPage={setPage} />;
};

const MapWithProps = ({ tweaks, page, setPage }) => {

  return (

        display: "flex", justifyContent: "space-between", alignItems: "flex-start", zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "stretch", gap: 18 }}>
          {/* Vertical rule with copper diamond accent */}
          <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", width: 10 }}>
            <div style={{ position: "absolute", top: 2, bottom: 2, left: "50%", width: 1, background: P.ink, opacity: 0.55 }}/>
            <div style={{ position: "relative", width: 6, height: 6, background: P.copper, transform: "rotate(45deg)" }}/>
          </div>
          <div>
            <div style={{ fontFamily: '"Special Elite", monospace', fontSize: 11, letterSpacing: "0.35em", color: P.copper }}>SUDBURY</div>
            <TypewriterTitle fontSize={26} letterSpacing="0.08em" marginTop={4} color={P.ink} />
            <div style={{ fontFamily: '"EB Garamond", serif', fontStyle: "italic", fontSize: 14, color: P.mute, marginTop: 2 }}>萨德伯里华人口述历史</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 0, alignItems: "center", border: `1px solid ${P.ink}`, background: `${P.bg}cc` }}>
          <div onClick={() => setPage("map")} style={{ display: "inline-block" }}>
            <NavBtn color={P.ink} active>→ Map</NavBtn>
          </div>
          <div onClick={() => setPage && setPage("about")} style={{ display: "inline-block" }}><NavBtn color={P.ink} active={page === "about"}>About this Project</NavBtn></div>
          <MenuNav color={P.ink} palette={P} setPage={setPage} />
        </div>
      </div>

      <svg viewBox="0 0 1440 900" width="100%" height="100%" style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
        <MapFrame ink={P.ink} mute={P.mute} copper={P.copper} />
        {T.showContours && <Contours color={P.line} />}
        <LakeShape cx={820} cy={540} rx={190} ry={110} rot={-10} fill={P.water} stroke={P.line} label="RAMSEY LAKE" ink={P.ink} mute={P.mute} />
        <BigNickelShape cx={220} cy={530} r={42} stroke={P.line} fill={P.water} ink={P.ink} mute={P.mute} copper={P.copper} />
        <LakeShape cx={1180} cy={230} rx={140} ry={75} rot={-18} fill={P.water} stroke={P.line} label="LAKE LAURENTIAN" ink={P.ink} mute={P.mute} small />
        <PathNetwork points={POINTS} color={P.line} dash={pathDash} active={sel} copper={P.copper} />
        <text x={620} y={380} fill={P.mute} fontFamily='"EB Garamond", serif' fontStyle="italic" fontSize={13} letterSpacing="0.25em">DOWNTOWN</text>
        <text x={1040} y={420} fill={P.mute} fontFamily='"EB Garamond", serif' fontStyle="italic" fontSize={13} letterSpacing="0.25em">MINNOW LAKE</text>
        <text x={340} y={700} fill={P.mute} fontFamily='"EB Garamond", serif' fontStyle="italic" fontSize={13} letterSpacing="0.25em">COPPER CLIFF</text>
        <text x={860} y={170} fill={P.mute} fontFamily='"EB Garamond", serif' fontStyle="italic" fontSize={13} letterSpacing="0.25em">NEW SUDBURY</text>
      </svg>

      {T.showCompass &&
      <div style={{ position: "absolute", top: 180, right: 76 }}>
          <Compass color={P.ink} copper={P.copper} mute={P.mute} />
        </div>
      }

      {POINTS.map((pt) => {
        const isPending = !pt.blurb && pt.kind !== "event";
        return (
          <Pin key={pt.id} pt={pt} active={sel === pt.id} hover={hover === pt.id}
          palette={P} style={T.pinStyle} pending={isPending}
          onClick={isPending ? () => {} : () => setSel(pt.id)}
          onHoverIn={() => setHover(pt.id)} onHoverOut={() => setHover(null)} />
        );
      })}

      <SidePanel point={active} palette={P} collapsed={panelCollapsed} onToggle={() => setPanelCollapsed((c) => !c)} setPage={setPage} />

      <div style={{ position: "absolute", left: 56, bottom: 36, maxWidth: 520, zIndex: 5 }}>
        <div style={{ fontFamily: '"Special Elite", monospace', fontSize: 11, letterSpacing: "0.2em", color: P.copper }}>
          SELECT A LOCATION · OR LET US GUIDE YOU
        </div>
        <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 26, fontStyle: "italic", lineHeight: 1.2, marginTop: 10, color: P.ink }}>
          Unshadowing the lives of Chinese immigrants<br />in a small Northern Ontario city —<br /><span style={{ color: P.copper }}>one story at a time.</span>
        </div>
        <div style={{ fontFamily: '"Caveat", cursive', fontSize: 22, color: P.copper, marginTop: 14, transform: "rotate(-1deg)" }}>
          eight stops on the map — more coming.
        </div>
      </div>

      <div style={{ position: "absolute", right: 56, bottom: 36, textAlign: "right", fontFamily: '"EB Garamond", serif', color: P.ink, zIndex: 5 }}>
        <div style={{ fontStyle: "italic", fontSize: 17 }}>Sudbury Chinese Oral History</div>
        <div style={{ fontFamily: '"Special Elite", monospace', fontSize: 10, letterSpacing: "0.2em", color: P.mute, marginTop: 6 }}>
          LAURENTIAN UNIVERSITY · ONT.
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-end", marginTop: 14 }}>
          <div style={{ fontFamily: '"Cormorant Garamond", serif', fontSize: 44, lineHeight: 1, color: P.copper }}>5</div>
          <div style={{ fontFamily: '"Special Elite", monospace', fontSize: 10, letterSpacing: "0.2em", color: P.mute, textAlign: "left", lineHeight: 1.2 }}>
            STOPS<br />ON THIS<br />MAP
          </div>
        </div>
      </div>
    </div>);

};

ReactDOM.createRoot(document.getElementById("canvas")).render(<App />);
